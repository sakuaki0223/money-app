<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お金管理アプリ</title>

<style>
body{font-family:Arial;margin:0;padding:16px;background:#f5f7fb}
.container{max-width:700px;margin:0 auto}
.card{background:#fff;border-radius:12px;padding:16px;margin-bottom:16px;box-shadow:0 3px 10px rgba(0,0,0,.08)}
input,select,button{width:100%;padding:10px;margin-top:8px;border-radius:8px;border:1px solid #ccc}
button{cursor:pointer;font-weight:bold}
.btn-main{background:#2563eb;color:#fff;border:none}
.btn-sub{background:#10b981;color:#fff;border:none}
.btn-danger{background:#ef4444;color:#fff;border:none}
.summary{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.summary div{background:#eef4ff;padding:10px;border-radius:8px}
.category{border:1px solid #ddd;padding:10px;margin-top:10px;border-radius:8px}
</style>
</head>

<body>
<div class="container">

<h1>お金管理アプリ</h1>

<div class="card">
<h2>月予算</h2>
<input type="number" id="monthlyBudget">
<button class="btn-main" onclick="saveMonthlyBudget()">保存</button>
</div>

<div class="card">
<h2>項目追加</h2>
<input type="text" id="categoryName" placeholder="項目名">
<input type="number" id="categoryBudget" placeholder="予算">
<button class="btn-sub" onclick="addCategory()">追加</button>
</div>

<div class="card">
<h2>支出追加</h2>
<select id="expenseCategory"></select>
<input type="number" id="expenseAmount" placeholder="金額">
<input type="text" id="expenseMemo" placeholder="メモ">
<button class="btn-main" onclick="addExpense()">追加</button>
</div>

<div class="card">
<h2>全体状況</h2>
<div class="summary">
<div>予算<br><strong id="totalBudgetView">0円</strong></div>
<div>使用<br><strong id="totalSpentView">0円</strong></div>
<div>残り<br><strong id="remainingView">0円</strong></div>
</div>
</div>

<div class="card">
<h2>項目一覧</h2>
<div id="categoriesList"></div>
</div>

<div class="card">
<h2>履歴</h2>
<div id="historyList"></div>
</div>

<div class="card">
<button class="btn-danger" onclick="resetAllData()">全部リセット</button>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB-ZpOateSymeJnHnBa_jOZ2omqJ6uuqBA",
  authDomain: "money-app-project-2e35f.firebaseapp.com",
  projectId: "money-app-project-2e35f",
  storageBucket: "money-app-project-2e35f.firebasestorage.app",
  messagingSenderId: "895254704145",
  appId: "1:895254704145:web:18edd1fe739cb292bf01b0"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let appData = {
  monthlyBudget: 0,
  categories: [],
  expenses: []
};

function formatYen(v){
  return Number(v).toLocaleString("ja-JP")+"円";
}

async function saveData(){
  await setDoc(doc(db,"appData","main"),appData);
}

async function loadData(){
  const snap = await getDoc(doc(db,"appData","main"));
  if(snap.exists()){
    appData = snap.data();
  }
  render();
}

function saveMonthlyBudget(){
  appData.monthlyBudget = Number(document.getElementById("monthlyBudget").value)||0;
  saveData();
  render();
}

function addCategory(){
  const name=document.getElementById("categoryName").value.trim();
  const budget=Number(document.getElementById("categoryBudget").value);
  if(!name||isNaN(budget))return;

  appData.categories.push({
    id:Date.now(),
    name,
    budget
  });

  document.getElementById("categoryName").value="";
  document.getElementById("categoryBudget").value="";

  saveData();
  render();
}

function addExpense(){
  const categoryId=Number(document.getElementById("expenseCategory").value);
  const amount=Number(document.getElementById("expenseAmount").value);
  const memo=document.getElementById("expenseMemo").value;

  if(isNaN(amount)||amount<=0)return;

  appData.expenses.push({
    id:Date.now(),
    categoryId,
    amount,
    memo,
    date:new Date().toLocaleString("ja-JP")
  });

  document.getElementById("expenseAmount").value="";
  document.getElementById("expenseMemo").value="";

  saveData();
  render();
}

function deleteCategory(id){
  appData.categories = appData.categories.filter(c=>c.id!==id);
  saveData();
  render();
}

function deleteExpense(id){
  appData.expenses = appData.expenses.filter(e=>e.id!==id);
  saveData();
  render();
}

function resetAllData(){
  appData = {monthlyBudget:0,categories:[],expenses:[]};
  saveData();
  render();
}

function getCategorySpent(id){
  return appData.expenses
    .filter(e=>e.categoryId===id)
    .reduce((s,e)=>s+e.amount,0);
}

function render(){
  document.getElementById("monthlyBudget").value = appData.monthlyBudget||"";

  const totalSpent = appData.expenses.reduce((s,e)=>s+e.amount,0);
  document.getElementById("totalBudgetView").textContent = formatYen(appData.monthlyBudget);
  document.getElementById("totalSpentView").textContent = formatYen(totalSpent);
  document.getElementById("remainingView").textContent = formatYen(appData.monthlyBudget-totalSpent);

  const select=document.getElementById("expenseCategory");
  select.innerHTML="";
  appData.categories.forEach(c=>{
    const o=document.createElement("option");
    o.value=c.id;
    o.textContent=c.name;
    select.appendChild(o);
  });

  const catBox=document.getElementById("categoriesList");
  catBox.innerHTML="";
  appData.categories.forEach(c=>{
    const spent=getCategorySpent(c.id);
    const div=document.createElement("div");
    div.className="category";
    div.innerHTML=`
      <strong>${c.name}</strong><br>
      予算：${formatYen(c.budget)}<br>
      使用：${formatYen(spent)}<br>
      残り：${formatYen(c.budget-spent)}<br>
      <button onclick="deleteCategory(${c.id})" class="btn-danger">削除</button>
    `;
    catBox.appendChild(div);
  });

  const history=document.getElementById("historyList");
  history.innerHTML="";
  [...appData.expenses].reverse().forEach(e=>{
    const c=appData.categories.find(x=>x.id===e.categoryId);
    const div=document.createElement("div");
    div.innerHTML=`
      <strong>${formatYen(e.amount)}</strong> / ${c?c.name:"不明"}<br>
      ${e.memo||""}<br>
      <button onclick="deleteExpense(${e.id})" class="btn-danger">削除</button>
      <hr>
    `;
    history.appendChild(div);
  });
}

window.saveMonthlyBudget = saveMonthlyBudget;
window.addCategory = addCategory;
window.addExpense = addExpense;
window.deleteCategory = deleteCategory;
window.deleteExpense = deleteExpense;
window.resetAllData = resetAllData;

window.onload = loadData;
</script>

</body>
</html>
